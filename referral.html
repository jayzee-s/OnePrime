<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>推荐好友 · OnePrime 恒旺国际</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js"></script>
  <link rel="stylesheet" href="css/style.css?v=202507041200">
</head>
<body>
  <div class="toast" id="toast"></div>
  <div id="auth-modal-mount"></div>
  <div id="cart-mount"></div>

  <div class="screen active" id="shopScreen">
    <div id="header-mount"></div>
    <div id="mobile-nav-mount"></div>

    <div class="shop-hero" style="padding:60px 5vw 50px;">
      <div style="font-size:.65rem;letter-spacing:.25em;color:var(--gold);margin-bottom:.75rem;">REFERRAL PROGRAMME</div>
      <h1>推荐<em>好友</em>赚佣金</h1>
      <p>邀请好友注册消费，您的下线每笔订单即时为您产生佣金</p>
    </div>

    <div id="refNotLoggedIn" style="display:none;max-width:480px;margin:3rem auto;padding:0 5vw;text-align:center;">
      <div style="font-size:3rem;margin-bottom:1rem;">🤝</div>
      <h2 style="font-family:'Playfair Display',serif;margin-bottom:.75rem;">登录后查看您的推荐信息</h2>
      <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:1.5rem;">登录后可获取专属推荐链接、查看下线列表和佣金记录。</p>
      <button class="tier-cta" onclick="openAuthModal()" style="max-width:200px;margin:0 auto;display:block;">立即登录</button>
    </div>

    <div id="refContent" style="display:none;max-width:1000px;margin:0 auto;padding:2rem 5vw 4rem;">

      <div class="ref-link-card">
        <div class="ref-link-title">🔗 我的专属推荐链接</div>
        <div class="ref-link-desc">朋友通过此链接注册后成为您的下线，他们每笔消费的 <strong id="refRateDisplay">—</strong>% 即时为您积累佣金</div>
        <div class="ref-link-row" style="margin-top:1rem;">
          <div class="ref-link-url" id="refLink">生成中…</div>
          <button class="ref-copy-btn" onclick="copyReferralLink()">复制链接</button>
        </div>
        <div class="ref-share-hint">💡 可直接粘贴到微信、朋友圈或发送给朋友</div>
      </div>

      <div class="ref-stats-grid">
        <div class="ref-stat-card"><div class="ref-stat-value" id="refStatDownlines">—</div><div class="ref-stat-label">已邀请下线</div></div>
        <div class="ref-stat-card"><div class="ref-stat-value text-gold" id="refStatCommission">¥—</div><div class="ref-stat-label">累计佣金</div></div>
        <div class="ref-stat-card"><div class="ref-stat-value" id="refStatOrders">—</div><div class="ref-stat-label">产生佣金订单数</div></div>
      </div>

      <div class="ref-section">
        <div class="ref-section-title">👥 我的下线</div>
        <div class="admin-card">
          <div id="refDownlines" style="padding:1rem 0;"></div>
        </div>
      </div>

      <div class="ref-section">
        <div class="ref-section-title">💰 佣金记录</div>
        <div class="admin-card">
          <div class="orders-table-wrap" id="refHistoryTable"></div>
          <div id="refHistoryCards"></div>
        </div>
      </div>

      <div class="ref-disclaimer">
        ⚠️ 本站为演示项目，佣金仅作记录展示，不涉及真实出金流程。单级推荐，下线的下线不计入您的佣金。
      </div>
    </div>

  </div>

  <script src="js/components.js?v=202507041200"></script>
  <script src="js/script.js?v=202507041200"></script>
  <script src="js/referral.js?v=202507041200"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("/sw.js").catch(function(e){ console.warn("SW:", e); });
      });
    }
  </script>
</body>
</html>
