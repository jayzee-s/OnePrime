<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>会员权益 · OnePrime 恒旺国际</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icon-180.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js?v=202507100930"></script>
  <link rel="stylesheet" href="css/style.css?v=202507100930">
</head>
<body>

  <div class="toast" id="toast"></div>
  <div id="auth-modal-mount"></div>
  <div id="cart-mount"></div>

  <div class="screen active" id="shopScreen">
    <div id="header-mount"></div>
    <div id="mobile-nav-mount"></div>

    <!-- HERO -->
    <div class="shop-hero membership-hero">
      <div style="font-size:.65rem;letter-spacing:.25em;color:var(--gold);margin-bottom:.75rem;">MEMBERSHIP</div>
      <h1>专属<em>会员特权</em><br>畅享品质生活折扣</h1>
      <p>三档会员等级 · 自主消费升级 · 全场专享折扣价</p>
    </div>

    <!-- CURRENT MEMBERSHIP STATUS (shown only when logged in) -->
    <div class="membership-status" id="membershipStatus" style="display:none;"></div>

    <!-- TIER CARDS -->
    <div class="membership-page-wrap">
      <div class="tier-grid" id="tierGrid"></div>

      <!-- HOW IT WORKS -->
      <div class="membership-info-card">
        <h3>会员等级如何升级？</h3>
        <ul class="membership-rules">
          <li><strong>直接付费升级</strong> — 随时可以补齐差价，立即升级到更高等级</li>
          <li><strong>累计消费自动解锁资格</strong> — 个人在本站的历史消费金额（不含示例/演示订单）达到对应等级门槛后，即可补差价升级（不会自动扣款，需您本人确认）</li>
          <li>折扣登录后自动在商品价格、购物车、结算页生效，无需手动输入优惠码</li>
        </ul>
        <div class="payment-disclaimer">
          ⚠️ <strong>本站为演示项目，未接入真实支付渠道。</strong>所有会员开通/升级均为模拟流程，不会产生真实扣款。
        </div>
      </div>
    </div>

  </div>

  </div><!-- /shopScreen -->

  <script src="js/components.js?v=202507100930"></script>
  <script src="js/script.js?v=202507100930"></script>
  <script src="js/membership.js?v=202507100930"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js").catch(function(err) {
          console.warn("SW registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
