<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>我的账户 · OnePrime 恒旺国际</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icon-32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="img/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="img/icon-180.png">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/db.js?v=202507081030"></script>
  <link rel="stylesheet" href="css/style.css?v=202507081030">
  <style>
    .acct-wrap{max-width:960px;margin:0 auto;padding:2rem 5vw 5rem;display:grid;grid-template-columns:220px 1fr;gap:2rem;align-items:start;}
    /* ── Sidebar ── */
    .acct-sidebar{position:sticky;top:80px;}
    .acct-user-card{background:var(--white);border-radius:var(--radius);border:1px solid rgba(0,0,0,.06);padding:1.5rem;text-align:center;margin-bottom:1rem;}
    .acct-avatar{width:64px;height:64px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:700;color:var(--deep);margin:0 auto .75rem;}
    .acct-display-name{font-weight:700;font-size:1rem;margin-bottom:.2rem;}
    .acct-email{font-size:.75rem;color:var(--text-muted);}
    .acct-tier-badge{display:inline-block;margin-top:.6rem;padding:3px 12px;border-radius:20px;font-size:.7rem;font-weight:700;background:var(--gold-pale);color:var(--mid);}
    .acct-nav{background:var(--white);border-radius:var(--radius);border:1px solid rgba(0,0,0,.06);overflow:hidden;}
    .acct-nav-item{display:flex;align-items:center;gap:.65rem;padding:.8rem 1.25rem;font-size:.85rem;color:var(--text-muted);cursor:pointer;border-left:3px solid transparent;transition:all .2s;}
    .acct-nav-item:hover{background:var(--cream);color:var(--text);}
    .acct-nav-item.active{background:var(--gold-pale);color:var(--mid);border-left-color:var(--gold);font-weight:600;}
    .acct-nav-icon{font-size:1rem;width:20px;text-align:center;}
    /* ── Main panels ── */
    .acct-panel{display:none;}
    .acct-panel.active{display:block;}
    .acct-card{background:var(--white);border-radius:var(--radius);border:1px solid rgba(0,0,0,.06);overflow:hidden;margin-bottom:1.25rem;}
    .acct-card-header{padding:1.25rem 1.5rem;border-bottom:1px solid rgba(0,0,0,.06);font-weight:700;font-size:.95rem;display:flex;align-items:center;justify-content:space-between;}
    .acct-card-body{padding:1.5rem;}
    /* Profile form */
    .acct-field{margin-bottom:1.1rem;}
    .acct-field label{display:block;font-size:.75rem;font-weight:600;color:var(--text-muted);margin-bottom:.3rem;letter-spacing:.03em;}
    .acct-field input{width:100%;padding:10px 14px;border:1px solid rgba(0,0,0,.12);border-radius:6px;font-size:.88rem;color:var(--text);transition:border .2s;}
    .acct-field input:focus{outline:none;border-color:var(--gold);}
    .acct-field input:read-only{background:var(--cream);color:var(--text-muted);cursor:not-allowed;}
    .acct-save-btn{background:var(--gold);border:none;color:var(--deep);padding:10px 24px;border-radius:6px;font-size:.88rem;font-weight:700;cursor:pointer;transition:background .2s;}
    .acct-save-btn:hover{background:var(--gold-light);}
    /* Membership status */
    .ms-inner{background:var(--white);border-radius:var(--radius);border:1px solid rgba(0,0,0,.06);padding:1.5rem;display:flex;flex-wrap:wrap;gap:1.5rem;align-items:center;}
    .ms-row{display:flex;flex-direction:column;gap:.25rem;}
    .ms-label{font-size:.72rem;color:var(--text-muted);letter-spacing:.04em;}
    .ms-value{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;}
    /* Order list */
    .order-row{display:flex;gap:1rem;padding:1rem 1.5rem;border-bottom:1px solid rgba(0,0,0,.05);align-items:flex-start;}
    .order-row:last-child{border-bottom:none;}
    .order-id{font-family:monospace;font-size:.72rem;color:var(--text-muted);margin-bottom:.3rem;}
    .order-items-text{font-size:.83rem;font-weight:600;margin-bottom:.25rem;line-height:1.4;}
    .order-meta{font-size:.75rem;color:var(--text-muted);}
    .order-right{text-align:right;flex-shrink:0;}
    .order-total{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;color:var(--gold);}
    .order-date{font-size:.72rem;color:var(--text-muted);margin-top:.25rem;}
    .empty-orders{text-align:center;padding:3rem 1rem;color:var(--text-muted);}
    .empty-orders .ei{font-size:2.5rem;margin-bottom:.75rem;}
    /* Disclaimer */
    .acct-disclaimer{font-size:.78rem;color:var(--text-muted);background:var(--cream);border-radius:6px;padding:.75rem 1rem;margin-top:.75rem;line-height:1.6;}
    /* Mobile */
    @media(max-width:700px){
      .acct-wrap{grid-template-columns:1fr;padding:1rem 4vw 4rem;}
      .acct-sidebar{position:static;}
      .acct-nav{display:flex;overflow-x:auto;border-radius:8px;margin-bottom:1rem;}
      .acct-nav::-webkit-scrollbar{display:none;}
      .acct-nav-item{flex-direction:column;gap:.2rem;padding:.6rem .85rem;border-left:none;border-bottom:3px solid transparent;white-space:nowrap;flex-shrink:0;font-size:.75rem;}
      .acct-nav-item.active{border-left:none;border-bottom-color:var(--gold);}
      .acct-user-card{display:flex;align-items:center;gap:1rem;text-align:left;padding:1rem 1.25rem;}
      .acct-avatar{width:48px;height:48px;font-size:1.2rem;margin:0;flex-shrink:0;}
    }
  </style>
</head>
<body>

  <div class="toast" id="toast"></div>
  <div id="auth-modal-mount"></div>
  <div id="cart-mount"></div>

  <div class="screen active" id="shopScreen">
    <div id="header-mount"></div>
    <div id="mobile-nav-mount"></div>

    <!-- PAGE HERO -->
    <div class="shop-hero" style="padding:50px 5vw 40px;">
      <h1 style="font-size:clamp(1.4rem,3.5vw,2rem);">我的<em>账户</em></h1>
      <p>管理您的个人信息、订单记录与会员权益</p>
    </div>

    <!-- NOT LOGGED IN STATE -->
    <div id="acctNotLoggedIn" style="display:none;text-align:center;padding:5rem 2rem;">
      <div style="font-size:3rem;margin-bottom:1rem;">🔒</div>
      <h3 style="font-family:'Playfair Display',serif;margin-bottom:.5rem;">请先登录</h3>
      <p style="color:var(--text-muted);margin-bottom:1.5rem;font-size:.88rem;">登录后可查看订单历史、会员状态和个人信息</p>
      <button class="acct-save-btn" onclick="openAuthModal()">登录 / 注册</button>
    </div>

    <!-- ACCOUNT CONTENT -->
    <div class="acct-wrap" id="acctContent" style="display:none;">

      <!-- Sidebar -->
      <aside class="acct-sidebar">
        <div class="acct-user-card">
          <div class="acct-avatar" id="acctAvatarLarge">U</div>
          <div>
            <div class="acct-display-name" id="acctDisplayName">—</div>
            <div class="acct-email" id="acctDisplayEmail">—</div>
            <div class="acct-tier-badge" id="acctTierBadge">非会员</div>
          </div>
        </div>
        <nav class="acct-nav">
          <div class="acct-nav-item active" onclick="switchAcctTab('orders')"><span class="acct-nav-icon">🧾</span>我的订单</div>
          <div class="acct-nav-item" onclick="switchAcctTab('profile')"><span class="acct-nav-icon">👤</span>个人信息</div>
          <div class="acct-nav-item" onclick="switchAcctTab('membership')"><span class="acct-nav-icon">💎</span>会员状态</div>
          <div class="acct-nav-item" onclick="switchAcctTab('password')"><span class="acct-nav-icon">🔑</span>修改密码</div>
        </nav>
      </aside>

      <!-- Main -->
      <main>

        <!-- ── 我的订单 ── -->
        <div class="acct-panel active" id="acct-panel-orders">
          <div class="acct-card">
            <div class="acct-card-header">
              我的订单
              <select class="filter-select" id="acctOrderFilter" onchange="renderAccountOrders()" style="font-size:.78rem;padding:6px 10px;">
                <option value="all">全部状态</option>
                <option value="processing">处理中</option>
                <option value="shipped">已发货</option>
                <option value="completed">已完成</option>
                <option value="pending">待付款</option>
                <option value="cancelled">已取消</option>
              </select>
            </div>
            <div id="acctOrderList"></div>
          </div>
        </div>

        <!-- ── 个人信息 ── -->
        <div class="acct-panel" id="acct-panel-profile">
          <div class="acct-card">
            <div class="acct-card-header">个人信息</div>
            <div class="acct-card-body">
              <div class="acct-field">
                <label>姓名</label>
                <input type="text" id="acctName" placeholder="您的姓名" />
              </div>
              <div class="acct-field">
                <label>邮箱地址</label>
                <input type="email" id="acctEmail" readonly />
              </div>
              <div class="acct-field">
                <label>注册方式</label>
                <input type="text" id="acctProvider" readonly />
              </div>
              <div class="acct-field">
                <label>注册时间</label>
                <input type="text" id="acctJoined" readonly />
              </div>
              <button class="acct-save-btn" onclick="saveProfile()">保存修改</button>
            </div>
          </div>
        </div>

        <!-- ── 会员状态 ── -->
        <div class="acct-panel" id="acct-panel-membership">
          <div class="acct-card">
            <div class="acct-card-header">会员状态</div>
            <div class="acct-card-body" id="acctMembershipBody"></div>
          </div>
        </div>

        <!-- ── 修改密码 ── -->
        <div class="acct-panel" id="acct-panel-password">
          <div class="acct-card">
            <div class="acct-card-header">修改密码</div>
            <div class="acct-card-body">
              <div class="acct-field">
                <label>当前密码</label>
                <input type="password" id="pwdCurrent" placeholder="输入当前密码" />
              </div>
              <div class="acct-field">
                <label>新密码</label>
                <input type="password" id="pwdNew" placeholder="至少6位" />
              </div>
              <div class="acct-field">
                <label>确认新密码</label>
                <input type="password" id="pwdConfirm" placeholder="再次输入新密码" />
              </div>
              <button class="acct-save-btn" onclick="changePassword()">确认修改</button>
              <div class="acct-disclaimer">⚠️ 本站为演示项目，密码修改为模拟流程，不会产生实际的身份验证变更。</div>
            </div>
          </div>
        </div>

      </main>
    </div><!-- /acct-wrap -->

  </div><!-- /shopScreen -->

  <script src="js/components.js?v=202507081030"></script>
  <script src="js/script.js?v=202507081030"></script>
  <script src="js/account.js?v=202507081030"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function() {
        navigator.serviceWorker.register("sw.js").catch(function(err) {
          console.warn("SW registration failed:", err);
        });
      });
    }
  </script>
</body>
</html>
